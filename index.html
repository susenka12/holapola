<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kočičí věštírna</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="cat-face">
        <div class="ear ear-left"></div>
        <div class="ear ear-right"></div>
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="nose"></div>
        <div class="mouth"></div>
        <div class="tongue"></div>
        <div class="whisker whisker-left whisker-left1"></div>
        <div class="whisker whisker-left whisker-left2"></div>
        <div class="whisker whisker-right whisker-right1"></div>
        <div class="whisker whisker-right whisker-right2"></div>
        <div class="cheek cheek-left"></div>
        <div class="cheek cheek-right"></div>
        <div class="paw paw-left">
          <span class="paw-label">6</span>
        </div>
        <div class="paw paw-right">
          <span class="paw-label">7</span>
        </div>
        <div class="stars">
          <div class="star star1"></div>
          <div class="star star2"></div>
          <div class="star star3"></div>
          <div class="star star4"></div>
          <div class="star star5"></div>
          <div class="star star6"></div>
          <div class="star star7"></div>
          <div class="star star8"></div>
          <div class="star star9"></div>
          <div class="star star10"></div>
          <div class="star star11"></div>
          <div class="star star12"></div>
          <div class="star star13"></div>
          <div class="star star14"></div>
          <div class="star star15"></div>
          <div class="star star16"></div>
        </div>
      </div>
      <h1>Kočičí věštírna</h1>
      <p class="description">Napiš svou otázku do pole a kočka ti za chvíli odpoví.</p>
      <div class="question-area">
        <input id="fortuneQuestion" type="text" placeholder="Napiš otázku..." />
        <button id="fortuneButton" type="button">Ptát se kočky</button>
      </div>
      <div id="fortuneResult" class="fortune-box">Zde se objeví kočičí věštba.</div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
